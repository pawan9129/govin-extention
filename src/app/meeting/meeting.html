<div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
    <label for="tab-scheduling" style="cursor: pointer; padding: 4px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </label>
    <h1 style="margin: 0;">New event type</h1>
</div>
<div class="modal-container">
    <div class="headerr">
        <div class="type-selector">
            <button class="type-chip active">Meeting</button>
        </div>
        <div class="share-toggle">
            <span>Share</span>
            <label class="switch">
                <input type="checkbox" [(ngModel)]="meeting.share" name="share">
                <span class="slider"></span>
            </label>
            <span>Private</span>
        </div>
    </div>
    <form (submit)="$event.preventDefault()">
        <!-- Subject -->
        <div class="form-group">
            <div class="subject-row">
                <input type="text" placeholder="Add Subject *" required [(ngModel)]="meeting.subject" name="subject"
                    style="border-top: none; border-left: none; border-right: none; border-radius: 0;">
                <button class="icon-btn" title="AI Assistant">🤖</button>
                <button class="icon-btn" title="Palette">🎨</button>
            </div>
        </div>

        <!-- Date and Time -->
        <div class="form-group">
            <div class="date-time-grid">
                <input type="text" [(ngModel)]="meeting.startDate" name="startDate" >
                <input type="time" [(ngModel)]="meeting.startTime" name="startTime" >
            </div>
            <div class="date-time-grid">
                <input type="text" [(ngModel)]="meeting.endDate" name="endDate" >
                <input type="time" [(ngModel)]="meeting.endTime" name="endTime">
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="custom-time" [(ngModel)]="meeting.customTime" name="customTime">
                <label for="custom-time">Custom Time</label>
            </div>
        </div>
        <div class="date-time-grid">
            <div class="form-group">
                <label>Meeting type <span class="required">*</span></label>
                <select [(ngModel)]="meeting.meetingType" name="meetingType">
                    <option>Other (In Person)</option>
                    <option>Video Call</option>
                </select>
            </div>
            <div class="form-group">
                <label>Venue <span class="required">*</span></label>
                <input type="text" [(ngModel)]="meeting.venue" name="venue">
            </div>
        </div>
        <!-- Priority and Remarks -->
        <div class="date-time-grid">
            <div class="form-group">
                <label>Priority</label>
                <select [(ngModel)]="meeting.priority" name="priority">
                    <option>Top</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>
            <div class="form-group">
                <label>Remarks</label>
                <input type="text" placeholder="Please Enter Remarks" [(ngModel)]="meeting.remarks" name="remarks">
            </div>
        </div>
        <!-- Participants -->
        <div class="form-group">
            <input type="text" placeholder="Search internal participant" [(ngModel)]="meeting.participant"
                name="participant">
            <div class="checkbox-row">
                <input type="checkbox" id="all-mdos" [(ngModel)]="meeting.allMdos" name="allMdos">
                <label for="all-mdos">All MDOs</label>
            </div>
        </div>
        <!-- Footer -->
        <div class="footer-actions">
            <button class="btnn btn-moree">More Options</button>
            <button class="btnn btn-draftt">SAVE DRAFT</button>
            <button class="btnn btn-savee" (click)="createMeeting()">SAVE</button>
        </div>
    </form>
</div>
