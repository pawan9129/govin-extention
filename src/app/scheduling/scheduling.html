<h1>Event types</h1>
<div class="search-bar">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
    <circle cx="11" cy="11" r="8"></circle>
    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
  </svg>
  <input type="text" placeholder="Search meetings..." [(ngModel)]="searchText" (input)="filterMeetings()" />
</div>

<div class="user-header">
  <div class="avatar">P</div>
  <span style="font-weight: 600;">Pawan Maurya</span>
</div>
<div *ngIf="loading" class="info-text">
  Loading meetings...
</div>
<div *ngIf="error" class="error-text">
  {{ error }}
</div>
<div *ngIf="!loading && filteredMeetings.length > 0">
  <div *ngFor="let meeting of filteredMeetings" class="event-card mb-2"
    [ngStyle]="{'border-left': '5px solid ' + (meeting.color2 || '#4CAF50')}">
     <!-- <div class="event-title">
      {{ meeting.host || 'No Host' }}
      <span class="status">
        ({{ meeting.meeting_status_name || 'Pending' }})
      </span>
    </div> -->
    <div class="event-title">  {{ meeting.host || 'No Host' }}</div>
    <div class="event-meta">30 mins • One-on-One</div>
      <div class="event-meta">
      {{ meeting.start | date:'mediumDate' }} •
      {{ meeting.start | date:'shortTime' }} -
      {{ meeting.end | date:'shortTime' }}
    </div>
    <!-- <div class="event-meta">
      {{ meeting.ministryShortName || 'N/A' }}
    </div> -->
    <!-- <div class="event-meta">
      Mode: {{ meeting.mode || 'N/A' }}
    </div> -->
    <div class="event-actions">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
      </svg>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <polyline points="22,6 12,13 2,6"></polyline>
      </svg>
      <!-- <a href="#" class="btn-copy">🔗 Copy link</a> -->
      <div class="event-actions">
        <a *ngIf="meeting.meeting_url" [href]="meeting.meeting_url" target="_blank" class="btn">
          🔗 Join
        </a>
        <button *ngIf="meeting.meeting_url" (click)="copyLink(meeting.meeting_url)" class="btn">
          📋 Copy Link
        </button>
      </div>
    </div>
  </div>
</div>
